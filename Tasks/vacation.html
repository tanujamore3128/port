<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacation</title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container shadow p-5 rounded border border-3">
        <form class="p-5 ">
            <div class="row  justify-content-center mt-2 ">
                <div class="text-center mb-3">
                    <h1>Vacation Request Form</h1>
                    <label>Please fill out the form below to request your vacation time. </label>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-6">
                    <label><b>Frist Name</b></label>
                    <input type="text" class="form-control" placeholder="Enter your first name">
                </div>
                <div class="col-lg-6">
                    <label><b>Last Name</b></label>
                    <input type="text" class="form-control" placeholder="Enetr your last name">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-12">
                    <label><b>Email</b></label>
                    <input type="email" class="form-control" placeholder="Enter your email address">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-6">
                    <label><b>Phone Number</b></label>
                    <input type="number" class="form-control" placeholder="Enter phone number">
                </div>
                <div class="col-lg-6">
                    <label placeholder="select your Department"><b>Departments</b></label>
                    <select class="form-select">
                        <option>Computer Engineering</option>
                        <option>Electrical Engineering</option>
                        <option>Electronics Engineering</option>
                        <option>Mechanical Engineering</option>
                        <option>Civil Engineering</option>
                    </select>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-6">
                    <label><b>Vacation Start Date</b></label>
                    <input type="date" class="form-control" placeholder="MM/DD/YYYY">
                </div>
                <div class="col-lg-6">
                    <label><b>Vacation End Date</b></label>
                    <input type="date" class="form-control" placeholder="MM/DD/YYYY">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-12">
                    <label class="form-lable"><b>Vacation Type</b></label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="Vacation Type" id="Paid Time off(PTO)">
                        <label class="form-check-lable" for="PTO">Paid Time Off(PTO)</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="Vacation Type" id="Sick Leave">
                        <label class="form-check-lable" for="Sick Leave">Sick Leave</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="Vacation Type" id="Unpaid Leave">
                        <label class="form-check-lable" for="Unpaid Leave">Unpaid Leave</label>
                    </div>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-12">
                    <label><b>Reason For Vacation</b></label>
                    <textarea class="form-control" placeholder="Please enter a brief description of your reason for vacation"></textarea>
                </div>
            </div>
            <p style="opacity: 0.7;">This will help us better understand your request</p>
             <div class="row mt-3">
                <div class="col-lg-12">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="agree">
                        <label class="form-check-lable" for="agree">
                            I certify that the information provided above is true and accurate, and I agree to abide by the company's policies and procedures.
                        </label>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-lg-12 text-center">
                        <input type="submit" value="Submit Request" class="btn btn-primary">
                    </div>
                </div>

        </form>
    </div>

</body>

</html>

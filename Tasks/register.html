<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="row mt-4 justify-content-center">
            <div class="col-lg-6 shadow p-2 border">
              <div class="text-center"> <h3>--------------Register----------------</h3></div> 
                <p style="opacity: 0.8;">Create your account.It's free and only takes a minute.</p>
                <form>
                    <div class="row">
                        <div class="mb-3 col-lg-6">

                            <input type="text" class="form-control" placeholder="First name">
                        </div>
                        <div class="col-lg-6 ">
                            <div class="mb-3">

                                <input type="text" class="form-control" placeholder=" Last name">
                            </div>
                        </div>

                        <div class="col-lg-12 ">
                            <div class="mb-3">

                                <input type="email" class="form-control" placeholder="Email">
                            </div>
                        </div>
                        <div class="col-lg-12 ">
                            <div class="mb-3">

                                <input type="password" class="form-control" placeholder="password">
                            </div>
                        </div>
                        <div class="col-lg-12 ">
                            <div class="mb-3">

                                <input type="password" class="form-control" placeholder=" Confirm password">
                            </div>
                        </div>

                       <div class="col-12 mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="agree">
                                <label class="form-check-label" for="agree">
                                   I accept the <span class="text-success">Terms of Uses</span>& <span class="text-success">Privacy Policy</span>.
                                </label>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-lg-12">
                                <div>
                                    <input type="submit" value="Register Now" class="btn btn-primary mt-3"
                                        style="width: 100%;">
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <p class="text-center">Already have an account?<u>Sign in</u></p>
    </div>
</body>

</html>

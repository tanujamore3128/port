<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient_Registration</title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div class="container shadow p-5 rounded">
        <div class="row  justify-content-center mt-5 ">
            <div class="text-center">
                <h1>Patient Registration Form</h1>
                <label>Please fill in your details to register as a new patient</label>
            </div>
        </div>
        <form class="shadow p-5 rounded">
            <div class="row mt-3">
                <div class="col-lg-6    ">

                    <label><b>Frist Name</b></label>
                    <input type="text" class="form-control" placeholder="Enter your first name">
                </div>
                <div class="col-lg-6 ">
                    <label><b>Last Name</b></label>
                    <input type="text" class="form-control" placeholder="Enter your last name">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-6">
                    <label><b>Date of Brith</b></label>
                    <input type="date" class="form-control">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-12 mb-3">
                    <label class="form-check-lable"><b> Gender</b></label>
                    <div class="mt-2">
                        <input class="form-check-input" type="radio" name="gender" id="male">
                        <label class="form-check-lable" for="male"> male</label>
                        <input class="form-check-input" type="radio" name="gender" id="female">
                        <label class="form-check-lable" for="female"> female</label>
                        <input class="form-check-input" type="radio" name="gender" id="other">
                        <label class="form-check-lable" for="other"> other</label>
                    </div>
                </div>

            </div>
            <div class="row mt-3">
                <div class="col-lg-12">
                    <label><b>Email Address</b></label>
                    <input type="email" class="form-control" placeholder="Enter your email">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-12">
                    <label><b>Phone Number</b></label>
                    <input type="number" class="form-control" placeholder="+ (555) 123-4567">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-12">
                    <label><b>Address</b></label>
                    <textarea class="form-control" placeholder="Enter your address here"></textarea>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-12">
                    <label><b>Emergency Contact Number</b></label>
                    <input type="number" class="form-control" placeholder="+1 (555) 987-6543">
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-lg-12">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="agree">
                        <label class="form-check-lable" for="agree">
                            I conset to the processing of my personal data in accordance with the privacy policy.
                        </label>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-lg-12 text-center">
                        <input type="submit" value="Register" class="btn btn-primary">
                    </div>
                </div>

            </div>
            
        </form>
    </div>
</body>

</html>
